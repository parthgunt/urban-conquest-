<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Urban Conquest – Setup</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="setup.css">
</head>
<body>

  <div id="setup">

    <!-- BACKGROUND -->
    <div class="geo-grid"></div>
    <div class="territory-glow"></div>

    <!-- SETUP CARD -->
    <div class="setup-box">
      <h2>Game Setup</h2>

      <!-- COLOR PICK -->
      <label>Territory Color</label>
      <div class="color-options">
        <span class="color purple active" data-color="purple"></span>
        <span class="color blue" data-color="blue"></span>
        <span class="color green" data-color="green"></span>
        <span class="color red" data-color="red"></span>
      </div>

    

      <!-- SUGGESTED OPTIONS -->
     
      <button id="startGameBtn">Start Game</button>
    </div>

  </div>

  <script src="setup.js"></script>
</body>
</html>
